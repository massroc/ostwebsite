name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    env:
      # Opt into Node 24 ahead of the June 2026 forced cutover.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # --branch=production matches the Pages project's production branch
          # (the project was created via Direct Upload; its production branch is "production")
          # so deploys land as Production and serve at opensystemstheory.org.
          command: pages deploy . --project-name=ostwebsite --branch=production --commit-dirty=true
